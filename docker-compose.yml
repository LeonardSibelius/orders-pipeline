services:

  postgres:
    image: postgres:16-alpine
    container_name: orders-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 2s
      timeout: 2s
      retries: 20

  # Redpanda exposes two listeners:
  #   - external (localhost:9092) for the Camel app running on the host
  #   - internal (redpanda:29092) for kafka-ui inside the docker network
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.1
    container_name: orders-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: orders-kafka-ui
    ports:
      - "8081:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:29092
