# Camel main runtime
camel.main.name = orders-pipeline
camel.main.sourceLocationEnabled = true

# Observability surface: dev console at /q/dev, health at /observe/health,
# Jolokia at /q/jolokia, all served on port 8080.
camel.server.enabled = true
camel.context.dev-console = true
camel.management.enabled = true
camel.management.dev-console-enabled = true
camel.management.health-check-enabled = true
camel.management.jolokia-enabled = true

# Kafka producer
camel.component.kafka.brokers = localhost:9092
camel.component.kafka.enable-idempotence = true
camel.component.kafka.request-required-acks = all
# Fail fast when the broker is unavailable so the route's error handler
# (and the DLQ path) engage in seconds, not minutes. The Kafka defaults
# (delivery.timeout.ms=120s) would stall the pipeline for many minutes
# per message during a broker outage.
camel.component.kafka.max-block-ms = 5000
camel.component.kafka.request-timeout-ms = 5000
camel.component.kafka.delivery-timeout-ms = 10000

# Postgres connection (consumed by PipelineConfiguration#ordersDataSource).
# These are dev credentials and match docker-compose.yml. For a real
# deployment, override any of them at launch with a JVM system property,
# e.g. -Dpostgres.password=... , or point camel-main at an external
# properties file -- do not commit real secrets here.
postgres.url = jdbc:postgresql://localhost:5432/orders
postgres.user = orders
postgres.password = orders
postgres.pool.maxSize = 8

# Reaper -- restores rows stuck IN_PROGRESS back to NEW so the main
# pipeline picks them up. interval-ms is the timer period; initial-delay
# defers the first tick so pre-existing NEW rows get claimed normally
# first; stuck-after-seconds is how long a row must sit IN_PROGRESS
# before it's eligible; max-claims is the poison-row cutoff -- past
# that, the reaper marks the row ERROR with reason 'stuck-too-many-times'.
reaper.interval-ms         = 60000
reaper.initial-delay-ms    = 10000
reaper.stuck-after-seconds = 300
reaper.max-claims          = 5
